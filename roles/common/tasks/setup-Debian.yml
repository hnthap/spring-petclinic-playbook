---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Disable UFW to prevent conflicts with firewalld
  community.general.ufw:
    state: disabled

- name: Install Java, PostgreSQL, unzip, firewalld and Python dependencies
  ansible.builtin.apt:
    name:
      - openjdk-21-jre-headless
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
      - firewalld
      - python3-firewall
      - unzip
      - curl
      - acl
    state: present
