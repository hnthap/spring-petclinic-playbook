---
- name: Install Java, PostgreSQL, unzip, firewalld and Python dependencies
  ansible.builtin.dnf:
    name:
      - java-21-openjdk-headless
      - postgresql-server
      - postgresql-contrib
      - python3-psycopg2
      - firewalld
      - python3-firewall
      - unzip
      - curl
      - acl
    state: present

- name: Check if PostgreSQL database is initialized
  ansible.builtin.stat:
    path: /var/lib/pgsql/data/PG_VERSION
  register: pg_initialized

- name: Initialize PostgreSQL database
  ansible.builtin.command:
    cmd: postgresql-setup --initdb
  when: not pg_initialized.stat.exists

- name: Update PostgreSQL authentication method to md5
  ansible.builtin.replace:
    path: /var/lib/pgsql/data/pg_hba.conf
    regexp: '\b(ident|scram-sha-256)\b'
    replace: 'md5'
  register: pg_hba_update

- name: Restart PostgreSQL if pg_hba.conf was updated
  ansible.builtin.systemd:
    name: postgresql
    state: restarted
  when: pg_hba_update.changed
