---
- name: Ensure base packages needed for repo management are present
  ansible.builtin.dnf:
    name:
      - dnf-plugins-core
      - firewalld
      - python3-firewall
      - java-21-openjdk
      - java-21-openjdk-devel
    state: present

- name: Check if Jenkins repository file exists
  ansible.builtin.stat:
    path: "{{ jenkins_repo_file }}"
  register: repo_file_check

- name: Add Jenkins repository file
  ansible.builtin.get_url:
    url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
    dest: "{{ jenkins_repo_file }}"
    mode: "0644"
    timeout: 120
  register: repo_download
  until: repo_download is success
  retries: 3
  delay: 10
  when: not repo_file_check.stat.exists

- name: Check if Jenkins repository key exists
  ansible.builtin.stat:
    path: /tmp/jenkins.io-2023.key
  register: repo_key_check

- name: Download Jenkins repository key locally
  ansible.builtin.get_url:
    url: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
    dest: /tmp/jenkins.io-2023.key
    mode: "0644"
    timeout: 120
  register: key_download
  until: key_download is success
  retries: 3
  delay: 10
  when: not repo_key_check.stat.exists

- name: Import Jenkins repository key from local file
  ansible.builtin.rpm_key:
    state: present
    key: /tmp/jenkins.io-2023.key

- name: Add Docker CE repository
  ansible.builtin.command:
    cmd: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo

- name: Install Jenkins and Docker
  ansible.builtin.dnf:
    name:
      - jenkins
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
