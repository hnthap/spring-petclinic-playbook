---
- name: Ensure Nexus service account exists
  ansible.builtin.user:
    name: "{{ nexus_user }}"
    system: true
    create_home: false
    home: "{{ nexus_home }}"
    shell: /bin/bash
    state: present

- name: Download Nexus archive
  ansible.builtin.get_url:
    url: "{{ nexus_download_url }}"
    dest: /opt/downloads/nexus-{{ nexus_version }}.tar.gz
    mode: "0644"
    timeout: 120
  register: nexus_download
  until: nexus_download is success
  retries: 3
  delay: 10

- name: Unarchive Nexus
  ansible.builtin.unarchive:
    src: "/opt/downloads/nexus-{{ nexus_version }}.tar.gz"
    dest: /opt
    remote_src: true
    creates: "{{ nexus_real_home }}"

- name: Symlink Nexus home
  ansible.builtin.file:
    src: "{{ nexus_real_home }}"
    dest: "{{ nexus_home }}"
    state: link
    force: true

- name: Ensure Nexus and sonatype-work directories are owned by nexus user
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ nexus_user }}"
    group: "{{ nexus_user }}"
    recurse: true
  loop:
    - "{{ nexus_real_home }}"
    - /opt/sonatype-work

- name: Configure Nexus run_as_user
  ansible.builtin.lineinfile:
    path: "{{ nexus_home }}/bin/nexus.rc"
    regexp: '^#?run_as_user='
    line: 'run_as_user="{{ nexus_user }}"'
    create: true

- name: Create Nexus systemd service
  ansible.builtin.template:
    src: nexus.service.j2
    dest: /etc/systemd/system/nexus.service
    mode: "0644"
