---
- name: Target 1 - Build Servers
  hosts: build_servers
  become: true
  pre_tasks:
    - name: Print the executing user
      ansible.builtin.debug:
        msg: "{{ lookup('env', 'USER') }}"
    - name: Demonstrate custom filter
      ansible.builtin.debug:
        msg: "{{ 'Deploying infrastructure' | make_uppercase }}"
  roles:
    - build_common
    - docker
    - jenkins

- name: Target 2 - Shared Services
  hosts: shared_services
  become: true
  strategy: free
  roles:
    - common
    - nexus
    - sonarqube

- name: Target 3 - Production App
  hosts: production_app
  become: true
  roles:
    - build_common
    - docker
